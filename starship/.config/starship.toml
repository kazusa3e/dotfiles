"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """\
    $username\
    $hostname\
    $directory\
    $git_branch\
    $git_commit\
    $git_state\
    $git_metrics\
    $cmd_duration\
    $jobs\
    $line_break\
    $character\
"""


[character]
success_symbol = "[ ➜ ](bold green)"
error_symbol = "[ ✗ ](bold red)"

[hostname]
ssh_symbol = "  "

[git_branch]
symbol = "  "

[git_metrics]
disabled = false
